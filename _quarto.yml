project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - tutorials/*.qmd
    - hw/*.qmd
    - final/*.qmd

website:
  title: "R for Health Research"
  search: true
  reader-mode: true
  repo-url: https://github.com/r-pophealth-research/online-course
  site-url: https://r-pophealth-research.github.io/online-course
  repo-actions: [edit, issue]
  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
  sidebar:
    style: floating
    contents:
      - section: "Getting started"
        contents:
          - index.qmd
          - tutorials/Week1_install_r_rstudio.qmd
      - section: "Tutorials"
        contents:
          - tutorials/Week2_data_structures.qmd
          - tutorials/Week3_functions_packages.qmd
          - tutorials/Week4_data_exploration.qmd
          - tutorials/Week5_data_manipulation.qmd
          - tutorials/Week6_descriptive_statistics.qmd
          - tutorials/Week7_statistical_analyses.qmd
          - tutorials/Week8-9_data_visualizations.qmd
          - tutorials/Week10_research_best_practices.qmd
      - section: "Homework"
        contents:
          - hw/HW1_markdown_and_data_types.qmd
          - hw/HW2_data_structures_and_functions.qmd
          - hw/HW3_data_exploration_and_manipulation.qmd
          - hw/HW5_data_visualizations.qmd
      - section: "Final"
        contents:
          - final/Final_Project.qmd

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    code-overflow: wrap
    engine: knitr
    execute:
      eval: false

# Bundle data and images with the site so WebR can access them
resources:
  - data/
  - tutorials/images/
  - images/

webr:
  show-startup-message: true
  channel-type: post-message

filters:
  - webr
